<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick Home - BLE LED Control</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #6200ee;
            color: white;
            transition: 0.3s;
            margin: 10px;
        }
        button:hover { background-color: #3700b3; }
        button:disabled { background-color: #444; cursor: not-allowed; }
        input[type="color"] {
            width: 100px;
            height: 100px;
            border: none;
            cursor: pointer;
            background: none;
            margin: 20px;
        }
        .status { margin-top: 15px; font-size: 0.9rem; color: #bb86fc; }
    </style>
</head>
<body>

<div class="container">
    <h2>LED Controller</h2>
    <button id="connectBtn">Connect to LED</button>
    <br>
    <input type="color" id="colorPicker" value="#ff0000" disabled>
    <br>
    <button class="effect" data-hex="5600000000f0aa" disabled>Turn Off</button>
    <button class="effect" data-hex="56ffffff00f0aa" disabled>White</button>
    <div class="status" id="status">Status: Disconnected</div>
</div>

<script>
    // UUIDs for common LotusLantern/LotusLamp X controllers
    const SERVICE_UUID = 0xFFD0;
    const CHARACTERISTIC_UUID = 0xFFD5;

    let bleDevice = null;
    let bleCharacteristic = null;

    const connectBtn = document.getElementById('connectBtn');
    const colorPicker = document.getElementById('colorPicker');
    const statusText = document.getElementById('status');
    const effectBtns = document.querySelectorAll('.effect');

    // Helper: Convert hex string to Uint8Array
    function hexToBytes(hex) {
        let bytes = [];
        for (let c = 0; c < hex.length; c += 2)
            bytes.push(parseInt(hex.substr(c, 2), 16));
        return new Uint8Array(bytes);
    }

    async function connectBLE() {
        try {
            statusText.textContent = "Status: Searching...";
            
            // 1. Request device
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }],
                optionalServices: [SERVICE_UUID]
            });

            // 2. Connect to Server
            const server = await bleDevice.gatt.connect();
            
            // 3. Get Service and Characteristic
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            statusText.textContent = "Status: Connected!";
            connectBtn.disabled = true;
            colorPicker.disabled = false;
            effectBtns.forEach(btn => btn.disabled = false);

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        } catch (error) {
            console.error(error);
            statusText.textContent = "Status: Connection Failed";
        }
    }

    function onDisconnected() {
        statusText.textContent = "Status: Disconnected";
        connectBtn.disabled = false;
        colorPicker.disabled = true;
        effectBtns.forEach(btn => btn.disabled = true);
    }

    async function sendColor(hex) {
        if (!bleCharacteristic) return;

        // Convert #RRGGBB to R, G, B integers
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);

        // Lotus Protocol: [0x56, R, G, B, 0x00, 0xf0, 0xaa]
        const payload = new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]);
        
        try {
            await bleCharacteristic.writeValue(payload);
        } catch (error) {
            console.error("Write error:", error);
        }
    }

    async function sendEffect(hexString) {
        if (!bleCharacteristic) return;
        const payload = hexToBytes(hexString);
        await bleCharacteristic.writeValue(payload);
    }

    // Event Listeners
    connectBtn.addEventListener('click', connectBLE);

    colorPicker.addEventListener('input', (e) => {
        sendColor(e.target.value);
    });

    effectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            sendEffect(btn.getAttribute('data-hex'));
        });
    });

</script>
</body>
</html>
