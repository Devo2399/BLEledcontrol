<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE - Ultimate Hardware Hub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2, h3 { color: #ffffff; text-align: center; margin: 10px 0; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); width: 100%; max-width: 600px; margin-bottom: 20px; }
        .device-card { background: #2a2a2a; border-left: 5px solid #6200ee; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .offline-card { border-left: 5px solid #555; opacity: 0.8; }
        
        button { background: #6200ee; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; transition: background 0.3s; }
        button:hover { background: #7c4dff; }
        .btn-row { display: flex; gap: 10px; }
        .btn-on { background: #03dac6; color: #000; }
        .btn-on:hover { background: #5df2d6; }
        .btn-off { background: #cf6679; color: #000; }
        .btn-off:hover { background: #ff7597; }
        
        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; gap: 10px; }
        .control-group label { flex-shrink: 0; width: 85px; font-size: 0.9rem; }
        input[type="color"] { width: 45px; height: 40px; border: none; background: none; cursor: pointer; padding: 0; }
        select { flex-grow: 1; padding: 10px; border-radius: 6px; background: #333; color: white; border: 1px solid #555; }
        input[type="range"] { flex-grow: 1; cursor: pointer; }
        
        .device-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .name-group { display: flex; flex-direction: column; cursor: pointer; }
        .device-name { font-weight: bold; font-size: 1.2rem; }
        .hardware-name { font-size: 0.75rem; color: #888; font-style: italic; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <h1>Yorick LED Hub</h1>

    <div class="panel">
        <button id="addDeviceBtn">+ Pair New LED Strip</button>
        <div id="globalStatus" style="text-align:center; font-size:0.8rem; color:#bb86fc; margin-top:10px;">Hardware Mode Only</div>
        
        <hr style="border-color: #333; margin: 15px 0;">
        
        <div class="btn-row">
            <button id="globalOnBtn" class="btn-on">ALL ON</button>
            <button id="globalOffBtn" class="btn-off">ALL OFF</button>
        </div>
    </div>

    <div class="panel" id="deviceListPanel" style="display: none;">
        <h2>Zones</h2>
        <div id="deviceContainer"></div>
    </div>

    <script>
        let connectedStrips = [];
        const SERVICES = [0xFFD0, 0xFFE0, 0xFFB0, 0xFFF0, '0000ffd0-0000-1000-8000-00805f9b34fb'];
        const CHARS = [0xFFD5, 0xFFE1, 0xFFF3, 0xFFF4];

        // FULL HARDWARE COMMAND MAP (28 Modes)
        const HW_EFFECTS = {
            "static": "Solid Color",
            "0x80": "[0x80] 7 Color Fade",
            "0x81": "[0x81] 3 Color Fade",
            "0x82": "[0x82] Red/Green Cross Fade",
            "0x83": "[0x83] Red/Blue Cross Fade",
            "0x84": "[0x84] Green/Blue Cross Fade",
            "0x85": "[0x85] 7 Color Strobe",
            "0x86": "[0x86] Red Strobe",
            "0x87": "[0x87] 3 Color Jump (R/G/B)",
            "0x88": "[0x88] Green Strobe",
            "0x89": "[0x89] Blue Strobe",
            "0x8a": "[0x8A] Yellow Strobe",
            "0x8b": "[0x8B] Cyan Strobe",
            "0x8c": "[0x8C] Purple Strobe",
            "0x8d": "[0x8D] White Strobe",
            "0x8e": "[0x8E] 7 Color Jump",
            "0x8f": "[0x8F] 3 Color Jump",
            "0x90": "[0x90] Red/Green Jump",
            "0x91": "[0x91] Red/Blue Jump",
            "0x92": "[0x92] Green/Blue Jump",
            "0x93": "[0x93] Rainbow Strobe",
            "0x94": "[0x94] Red Fade",
            "0x95": "[0x95] Green Fade",
            "0x96": "[0x96] Blue Fade",
            "0x97": "[0x97] Yellow Fade",
            "0x98": "[0x98] Cyan Fade",
            "0x99": "[0x99] Purple Fade",
            "0x9a": "[0x9A] White Fade",
            "0x9b": "[0x9B] Rainbow Jump"
        };

        const POWER_ON = new Uint8Array([0x7e, 0x00, 0x04, 0xf0, 0x00, 0x01, 0xff, 0x00, 0xef]);
        const POWER_OFF = new Uint8Array([0x7e, 0x00, 0x04, 0x00, 0x00, 0x00, 0xff, 0x00, 0xef]);

        function saveProfiles() {
            let data = {};
            connectedStrips.forEach(s => {
                data[s.id] = { name: s.customName, hw: s.hardwareName, color: s.currentColor, bright: s.currentBrightness, mode: s.effectMode, speed: s.effectSpeed, isOn: s.isOn };
            });
            localStorage.setItem('yorick_final_profiles', JSON.stringify(data));
        }

        async function sendCommand(strip, payloads) {
            if (!strip.characteristic) return;
            for (let p of payloads) {
                try { await strip.characteristic.writeValue(p); await new Promise(r => setTimeout(r, 60)); } catch (e) {}
            }
        }

        function buildPayloads(strip) {
            if (!strip.isOn) return [POWER_OFF];
            
            // NEW: Native Hardware Brightness Command
            let brightCmd = new Uint8Array([0x7e, 0x00, 0x01, strip.currentBrightness, 0x00, 0x00, 0xff, 0x00, 0xef]);
            
            if (strip.effectMode === "static") {
                let r = parseInt(strip.currentColor.slice(1,3), 16), g = parseInt(strip.currentColor.slice(3,5), 16), b = parseInt(strip.currentColor.slice(5,7), 16);
                // RGB unscaled here since brightCmd handles dimming inherently
                return [POWER_ON, brightCmd, new Uint8Array([0x7e, 0x00, 0x05, 0x03, r, g, b, 0x00, 0xef])];
            } else {
                let invSpeed = 101 - strip.effectSpeed; // Hardware speed: 1 is fast, 100 is slow
                return [POWER_ON, brightCmd, new Uint8Array([0x7e, 0x00, 0x03, parseInt(strip.effectMode, 16), invSpeed, 0x00, 0xff, 0x00, 0xef])];
            }
        }

        async function connectDevice(device, stripObj) {
            const server = await device.gatt.connect();
            let service, char;
            for (let u of SERVICES) { try { service = await server.getPrimaryService(u); if (service) break; } catch (e) {} }
            for (let u of CHARS) { try { char = await service.getCharacteristic(u); if (char) break; } catch (e) {} }
            stripObj.characteristic = char;
            stripObj.isConnected = true;
            device.addEventListener('gattserverdisconnected', () => { stripObj.isConnected = false; render(); });
            render();
            await sendCommand(stripObj, buildPayloads(stripObj));
        }

        document.getElementById('addDeviceBtn').addEventListener('click', async () => {
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: SERVICES });
            let strip = { id: device.id, customName: device.name || "New Strip", hardwareName: device.name || "Unknown", device: device, currentColor: "#ffffff", currentBrightness: 100, effectMode: "static", effectSpeed: 50, isOn: true, isConnected: false, characteristic: null };
            connectedStrips.push(strip);
            saveProfiles();
            await connectDevice(device, strip);
        });

        function render() {
            const container = document.getElementById('deviceContainer');
            container.innerHTML = '';
            document.getElementById('deviceListPanel').style.display = connectedStrips.length ? 'block' : 'none';

            connectedStrips.forEach(strip => {
                const card = document.createElement('div');
                card.className = `device-card ${strip.isConnected ? '' : 'offline-card'}`;
                let effectOptions = Object.entries(HW_EFFECTS).map(([val, name]) => `<option value="${val}" ${strip.effectMode === val ? 'selected' : ''}>${name}</option>`).join('');

                card.innerHTML = `
                    <div class="device-header">
                        <div class="name-group" onclick="rename('${strip.id}')">
                            <span class="device-name">${strip.customName} ✎</span>
                            <span class="hardware-name">${strip.hardwareName}</span>
                        </div>
                        <span class="status-badge" style="background:${strip.isConnected ? (strip.isOn ? '#03dac6' : '#cf6679') : '#555'}">
                            ${strip.isConnected ? (strip.isOn ? 'ON' : 'OFF') : 'OFFLINE'}
                        </span>
                    </div>
                    ${strip.isConnected ? `
                        <div class="control-group"><label>Color:</label><input type="color" value="${strip.currentColor}" id="c-${strip.id}"></div>
                        <div class="control-group"><label>Effect:</label><select id="e-${strip.id}">${effectOptions}</select></div>
                        <div class="control-group"><label>Speed:</label><input type="range" min="1" max="100" value="${strip.effectSpeed}" id="s-${strip.id}"></div>
                        <div class="control-group"><label>Brightness:</label><input type="range" min="1" max="100" value="${strip.currentBrightness}" id="b-${strip.id}"></div>
                        <div class="btn-row">
                            <button onclick="updateState('${strip.id}', 'on')" class="btn-on">ON</button>
                            <button onclick="updateState('${strip.id}', 'off')" class="btn-off">OFF</button>
                        </div>
                    ` : `<button onclick="reconnect('${strip.id}')">🔄 Reconnect</button>`}
                    <button style="background:none; color:#888; font-size:0.7rem; margin-top:10px;" onclick="remove('${strip.id}')">Forget Device</button>
                `;
                container.appendChild(card);

                if (strip.isConnected) {
                    document.getElementById(`c-${strip.id}`).oninput = (e) => updateState(strip.id, 'color', e.target.value);
                    document.getElementById(`e-${strip.id}`).onchange = (e) => updateState(strip.id, 'mode', e.target.value);
                    document.getElementById(`s-${strip.id}`).oninput = (e) => updateState(strip.id, 'speed', e.target.value);
                    document.getElementById(`b-${strip.id}`).oninput = (e) => updateState(strip.id, 'bright', e.target.value);
                }
            });
        }

        window.updateState = async (id, type, val) => {
            let s = connectedStrips.find(x => x.id === id);
            if (type === 'color') { s.currentColor = val; s.effectMode = 'static'; s.isOn = true; }
            if (type === 'mode') { s.effectMode = val; s.isOn = true; }
            if (type === 'speed') { s.effectSpeed = val; s.isOn = true; }
            if (type === 'bright') { s.currentBrightness = val; s.isOn = true; }
            if (type === 'on') s.isOn = true;
            if (type === 'off') s.isOn = false;
            saveProfiles();
            render();
            await sendCommand(s, buildPayloads(s));
        };

        window.rename = (id) => {
            let s = connectedStrips.find(x => x.id === id);
            let n = prompt("New name:", s.customName);
            if (n) { s.customName = n; saveProfiles(); render(); }
        };

        window.remove = (id) => {
            connectedStrips = connectedStrips.filter(x => x.id !== id);
            saveProfiles(); render();
        };

        window.reconnect = async (id) => {
            let s = connectedStrips.find(x => x.id === id);
            try {
                const dev = await navigator.bluetooth.requestDevice({ filters: [{ name: s.hardwareName }], optionalServices: SERVICES });
                await connectDevice(dev, s);
            } catch (e) {}
        };

        document.getElementById('globalOnBtn').onclick = () => connectedStrips.forEach(s => updateState(s.id, 'on'));
        document.getElementById('globalOffBtn').onclick = () => connectedStrips.forEach(s => updateState(s.id, 'off'));

        window.onload = () => {
            let saved = JSON.parse(localStorage.getItem('yorick_final_profiles')) || {};
            for (let id in saved) { connectedStrips.push({ id, ...saved[id], isConnected: false, device: null, characteristic: null }); }
            render();
        };
    </script>
</body>
</html>
