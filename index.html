<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        button { padding: 10px 20px; margin: 10px; border-radius: 5px; border: none; background: #6200ee; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; }
        input[type="color"] { width: 100px; height: 100px; border: none; background: none; cursor: pointer; margin: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>LED Control</h2>
        <button id="connect">Connect to LED</button>
        <br>
        <input type="color" id="color" value="#ff0000" disabled>
        <br>
        <button class="fx" data-hex="5600000000f0aa" disabled>Power Off</button>
        <div id="status">Status: Disconnected</div>
    </div>
    <script>
        const SVC_UUID = 0xFFD0;
        const CHR_UUID = 0xFFD5;
        let char = null;

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SVC_UUID] }],
                    optionalServices: [SVC_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SVC_UUID);
                char = await service.getCharacteristic(CHR_UUID);
                document.getElementById('status').innerText = "Status: Connected!";
                document.getElementById('color').disabled = false;
                document.querySelectorAll('.fx').forEach(b => b.disabled = false);
            } catch (e) { console.error(e); }
        });

        document.getElementById('color').addEventListener('input', async (e) => {
            if (!char) return;
            const r = parseInt(e.target.value.slice(1, 3), 16);
            const g = parseInt(e.target.value.slice(3, 5), 16);
            const b = parseInt(e.target.value.slice(5, 7), 16);
            await char.writeValue(new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]));
        });

        document.querySelectorAll('.fx').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!char) return;
                const bytes = btn.dataset.hex.match(/[0-9a-f]{2}/gi).map(h => parseInt(h, 16));
                await char.writeValue(new Uint8Array(bytes));
            });
        });
    </script>
</body>
</html>
