<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE - Hardware Remote</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); width: 100%; max-width: 600px; margin-bottom: 20px; }
        .device-card { background: #2a2a2a; border-left: 5px solid #6200ee; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .offline-card { border-left: 5px solid #555; opacity: 0.8; }
        button { background: #6200ee; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-on { background: #03dac6; color: #000; }
        .btn-off { background: #cf6679; color: #000; }
        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; gap: 10px; }
        input[type="color"] { width: 40px; height: 35px; border: none; background: none; cursor: pointer; }
        select { flex-grow: 1; padding: 8px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; }
        input[type="range"] { flex-grow: 1; cursor: pointer; }
        .hardware-name { font-size: 0.75rem; color: #888; font-style: italic; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <h1>Yorick LED Hub</h1>

    <div class="panel">
        <button id="addDeviceBtn">+ Pair New LED Strip</button>
        <div id="globalStatus" style="text-align:center; font-size:0.8rem; color:#bb86fc;">Syncing...</div>
        <hr style="border-color: #333; margin: 15px 0;">
        <div class="control-group">
            <label>Global Color:</label>
            <input type="color" id="globalColor" value="#ff0000">
        </div>
        <div class="btn-row" style="display:flex; gap:10px;">
            <button id="globalOnBtn" class="btn-on" style="flex:1">ALL ON</button>
            <button id="globalOffBtn" class="btn-off" style="flex:1">ALL OFF</button>
        </div>
    </div>

    <div class="panel" id="deviceListPanel" style="display: none;">
        <h2>Zones</h2>
        <div id="deviceContainer"></div>
    </div>

    <script>
        let connectedStrips = []; 
        const SERVICES = [0xFFD0, 0xFFE0, 0xFFB0, 0xFFF0, '0000ffd0-0000-1000-8000-00805f9b34fb'];
        const CHARS = [0xFFD5, 0xFFE1, 0xFFF3, 0xFFF4];

        // Hardware Command Map for ELK-BLEDOB (duoCo Strip dialect)
        const HW_EFFECTS = {
            "static": "Static Color",
            "0x87": "Smooth Rainbow Fade",
            "0x88": "Red Fade",
            "0x89": "Green Fade",
            "0x8a": "Blue Fade",
            "0x8b": "Yellow Fade",
            "0x8c": "Cyan Fade",
            "0x8d": "Purple Fade",
            "0x8e": "White Fade",
            "0x8f": "Red/Green Cross Fade",
            "0x90": "Red/Blue Cross Fade",
            "0x91": "Green/Blue Cross Fade",
            "0x92": "7 Color Strobe",
            "0x93": "Red Strobe",
            "0x94": "Green Strobe",
            "0x9b": "7 Color Smooth Jump"
        };

        function saveProfile(strip) {
            let saved = JSON.parse(localStorage.getItem('yorick_led_profiles')) || {};
            saved[strip.id] = { name: strip.customName, hardwareName: strip.hardwareName, color: strip.currentColor, bright: strip.currentBrightness, effect: strip.effectMode, speed: strip.effectSpeed };
            localStorage.setItem('yorick_led_profiles', JSON.stringify(saved));
        }

        async function sendData(characteristic, payloads) {
            if (!characteristic) return;
            for (let data of payloads) {
                try { await characteristic.writeValue(data); await new Promise(r => setTimeout(r, 50)); } catch (e) {}
            }
        }

        function getPayloads(strip) {
            if (strip.effectMode === "static") {
                let r = parseInt(strip.currentColor.slice(1,3), 16), g = parseInt(strip.currentColor.slice(3,5), 16), b = parseInt(strip.currentColor.slice(5,7), 16);
                let s = strip.currentBrightness / 100;
                return [
                    new Uint8Array([0x7e, 0x00, 0x04, 0xf0, 0x00, 0x01, 0xff, 0x00, 0xef]), // Wake
                    new Uint8Array([0x7e, 0x00, 0x05, 0x03, Math.round(r*s), Math.round(g*s), Math.round(b*s), 0x00, 0xef]) // Color
                ];
            } else {
                // Hardware effect: 0x7e 0x00 0x03 [MODE] [SPEED] 0x00 0xff 0x00 0xef
                // Speed for hardware is inverted: 0x01 is fastest, 0x64 (100) is slowest.
                let invSpeed = 101 - strip.effectSpeed;
                return [new Uint8Array([0x7e, 0x00, 0x03, parseInt(strip.effectMode, 16), invSpeed, 0x00, 0xff, 0x00, 0xef])];
            }
        }

        async function connect(device, strip) {
            const server = await device.gatt.connect();
            let service, characteristic;
            for (let u of SERVICES) { try { service = await server.getPrimaryService(u); if (service) break; } catch (e) {} }
            for (let u of CHARS) { try { characteristic = await service.getCharacteristic(u); if (characteristic) break; } catch (e) {} }
            strip.characteristic = characteristic;
            strip.isConnected = true;
            device.addEventListener('gattserverdisconnected', () => { strip.isConnected = false; render(); });
            render();
            sendData(characteristic, getPayloads(strip));
        }

        document.getElementById('addDeviceBtn').addEventListener('click', async () => {
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: SERVICES });
            let strip = { id: device.id, customName: device.name, hardwareName: device.name, device: device, currentColor: "#ffffff", currentBrightness: 100, effectMode: "static", effectSpeed: 50, isConnected: false };
            connectedStrips.push(strip);
            await connect(device, strip);
        });

        function render() {
            const container = document.getElementById('deviceContainer');
            container.innerHTML = '';
            document.getElementById('deviceListPanel').style.display = connectedStrips.length ? 'block' : 'none';
            
            connectedStrips.forEach(strip => {
                const card = document.createElement('div');
                card.className = `device-card ${strip.isConnected ? '' : 'offline-card'}`;
                let effectOptions = Object.entries(HW_EFFECTS).map(([val, name]) => `<option value="${val}" ${strip.effectMode === val ? 'selected' : ''}>${name}</option>`).join('');
                
                card.innerHTML = `
                    <div class="device-header">
                        <div class="name-group"><b>${strip.customName}</b> <br><span class="hardware-name">${strip.hardwareName}</span></div>
                        <span class="status-badge" style="background:${strip.isConnected ? '#03dac6' : '#555'}">${strip.isConnected ? 'LIVE' : 'OFFLINE'}</span>
                    </div>
                    ${strip.isConnected ? `
                        <div class="control-group"><label>Color:</label><input type="color" value="${strip.currentColor}" id="c-${strip.id}"></div>
                        <div class="control-group"><label>Effect:</label><select id="e-${strip.id}">${effectOptions}</select></div>
                        <div class="control-group"><label>Speed:</label><input type="range" min="1" max="100" value="${strip.effectSpeed}" id="s-${strip.id}"></div>
                        <div class="btn-row" style="display:flex; gap:10px;">
                            <button onclick="update('${strip.id}', 'on')" class="btn-on" style="flex:1">ON</button>
                            <button onclick="update('${strip.id}', 'off')" class="btn-off" style="flex:1">OFF</button>
                        </div>
                    ` : `<button onclick="reconnect('${strip.id}')">Reconnect</button>`}
                `;
                container.appendChild(card);
                
                if (strip.isConnected) {
                    document.getElementById(`c-${strip.id}`).oninput = (e) => update(strip.id, 'color', e.target.value);
                    document.getElementById(`e-${strip.id}`).onchange = (e) => update(strip.id, 'effect', e.target.value);
                    document.getElementById(`s-${strip.id}`).oninput = (e) => update(strip.id, 'speed', e.target.value);
                }
            });
        }

        window.update = async (id, type, val) => {
            let s = connectedStrips.find(x => x.id === id);
            if (type === 'color') s.currentColor = val;
            if (type === 'effect') s.effectMode = val;
            if (type === 'speed') s.effectSpeed = val;
            if (type === 'off') { await sendData(s.characteristic, [new Uint8Array([0x7e, 0x00, 0x04, 0x00, 0x00, 0x00, 0xff, 0x00, 0xef])]); return; }
            saveProfile(s);
            sendData(s.characteristic, getPayloads(s));
        };

        window.reconnect = async (id) => {
            let s = connectedStrips.find(x => x.id === id);
            const dev = await navigator.bluetooth.requestDevice({ filters: [{ name: s.hardwareName }], optionalServices: SERVICES });
            await connect(dev, s);
        };

        window.onload = () => {
            let saved = JSON.parse(localStorage.getItem('yorick_led_profiles')) || {};
            for (let id in saved) {
                connectedStrips.push({ id, ...saved[id], isConnected: false, device: null });
            }
            render();
            document.getElementById('globalStatus').innerText = connectedStrips.length + " profiles loaded.";
        };
    </script>
</body>
</html>
