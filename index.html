<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE - Smart Hub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2, h3 { color: #ffffff; text-align: center; margin: 10px 0; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); width: 100%; max-width: 600px; margin-bottom: 20px; }
        .device-card { background: #2a2a2a; border-left: 5px solid #6200ee; padding: 15px; margin-top: 15px; border-radius: 8px; }
        
        button { background: #6200ee; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; transition: background 0.3s; }
        button:hover { background: #7c4dff; }
        .btn-row { display: flex; gap: 10px; }
        .btn-on { background: #03dac6; color: #000; }
        .btn-on:hover { background: #5df2d6; }
        .btn-off { background: #cf6679; color: #000; }
        .btn-off:hover { background: #ff7597; }
        
        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; gap: 10px; }
        .control-group label { flex-shrink: 0; width: 80px; font-size: 0.9rem; }
        input[type="color"] { width: 40px; height: 35px; border: none; background: none; cursor: pointer; padding: 0; }
        select { flex-grow: 1; padding: 8px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; }
        input[type="range"] { flex-grow: 1; cursor: pointer; }
        
        .status-text { font-size: 0.85rem; color: #bb86fc; text-align: center; margin-top: 10px; }
        .device-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .name-group { display: flex; align-items: center; gap: 10px; }
        .device-name { font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
        .device-name:hover { color: #bb86fc; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: #000; }
        
        .disconnect-btn { background: transparent; border: 1px solid #cf6679; color: #cf6679; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .disconnect-btn:hover { background: #cf6679; color: black; }
    </style>
</head>
<body>

    <h1>Yorick LED Hub</h1>

    <div class="panel">
        <h2>Global Controls</h2>
        <button id="addDeviceBtn">+ Pair New LED Strip</button>
        <div class="status-text" id="globalStatus">0 Devices Connected</div>
        
        <hr style="border-color: #333; margin: 15px 0;">
        
        <div class="control-group">
            <label>Master Color:</label>
            <input type="color" id="globalColor" value="#ff0000">
            <select id="globalPresetColors">
                <option value="">-- Presets --</option>
            </select>
        </div>
        <div class="control-group">
            <label>Brightness:</label>
            <input type="range" id="globalBrightness" min="0" max="100" value="100">
        </div>
        <div class="btn-row">
            <button id="globalOnBtn" class="btn-on">Turn All ON</button>
            <button id="globalOffBtn" class="btn-off">Turn All OFF</button>
        </div>
    </div>

    <div class="panel" id="deviceListPanel" style="display: none;">
        <h2>Individual Zones</h2>
        <div id="deviceContainer"></div>
    </div>

    <script>
        // --- 1. CORE DATA & PERSISTENCE ---
        let connectedStrips = []; 
        const SERVICES = [0xFFD0, 0xFFE0, 0xFFB0, 0xFFF0, '0000ffd0-0000-1000-8000-00805f9b34fb'];
        const CHARS = [0xFFD5, 0xFFE1, 0xFFF3, 0xFFF4];

        // 16 Standard Remote Colors
        const PRESETS = {
            "Red": "#ff0000", "Green": "#00ff00", "Blue": "#0000ff", "White": "#ffffff",
            "Orange": "#ff6600", "Yellow": "#ffff00", "Cyan": "#00ffff", "Magenta": "#ff00ff",
            "Pink": "#ff1493", "Purple": "#800080", "Teal": "#008080", "Lime": "#00ffcc",
            "Peach": "#ffdab9", "Lavender": "#e6e6fa", "Mint": "#98ff98", "Maroon": "#800000"
        };

        const globalStatus = document.getElementById('globalStatus');
        const deviceListPanel = document.getElementById('deviceListPanel');
        const deviceContainer = document.getElementById('deviceContainer');

        // Populate Global Preset Dropdown
        const globalPresetSelect = document.getElementById('globalPresetColors');
        for (const [name, hex] of Object.entries(PRESETS)) {
            globalPresetSelect.innerHTML += `<option value="${hex}">${name}</option>`;
        }

        // Save state to Local Storage
        function saveProfile(strip) {
            let saved = JSON.parse(localStorage.getItem('yorick_led_profiles')) || {};
            saved[strip.id] = { 
                name: strip.customName, 
                color: strip.currentColor, 
                bright: strip.currentBrightness 
            };
            localStorage.setItem('yorick_led_profiles', JSON.stringify(saved));
        }

        // --- 2. HARDWARE COMMUNICATION ---
        function createPayloads(hexColor, brightnessPercent) {
            let r = parseInt(hexColor.slice(1,3), 16), g = parseInt(hexColor.slice(3,5), 16), b = parseInt(hexColor.slice(5,7), 16);
            let scale = brightnessPercent / 100;
            r = Math.round(r * scale); g = Math.round(g * scale); b = Math.round(b * scale);
            
            return [
                new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]), 
                new Uint8Array([0x7e, 0x00, 0x04, 0xf0, 0x00, 0x01, 0xff, 0x00, 0xef]),
                new Uint8Array([0x7e, 0x00, 0x05, 0x03, r, g, b, 0x00, 0xef])
            ];
        }

        const payloadOff = [
            new Uint8Array([0x56, 0x00, 0x00, 0x00, 0x00, 0xf0, 0xaa]),
            new Uint8Array([0x7e, 0x00, 0x04, 0x00, 0x00, 0x00, 0xff, 0x00, 0xef])
        ];

        async function sendData(characteristic, payloadsArray) {
            for (let data of payloadsArray) {
                try {
                    await characteristic.writeValue(data);
                    await new Promise(r => setTimeout(r, 40)); 
                } catch (e) { console.error("BLE Write Error", e); }
            }
        }

        // --- 3. SOFTWARE EFFECTS ENGINE ---
        function applyEffect(strip) {
            if (strip.effectTimer) clearInterval(strip.effectTimer);
            if (strip.effectMode === "static" || !strip.isOn) return;

            let tick = 0;
            // Map speed 1-100 to milliseconds (100 = fast 150ms, 1 = slow 1150ms)
            let speedMs = 1150 - (strip.effectSpeed * 10); 
            
            strip.effectTimer = setInterval(() => {
                tick++;
                if (strip.effectMode === "flash") {
                    let p = (tick % 2 === 0) ? createPayloads(strip.currentColor, strip.currentBrightness) : payloadOff;
                    sendData(strip.characteristic, p);
                } else if (strip.effectMode === "rainbow") {
                    const rainbow = ["#ff0000", "#ffff00", "#00ff00", "#00ffff", "#0000ff", "#ff00ff"];
                    let c = rainbow[tick % 6];
                    sendData(strip.characteristic, createPayloads(c, strip.currentBrightness));
                }
            }, Math.max(150, speedMs));
        }

        function stopEffect(strip) {
            if (strip.effectTimer) {
                clearInterval(strip.effectTimer);
                strip.effectTimer = null;
            }
        }

        // --- 4. DEVICE MANAGEMENT ---
        document.getElementById('addDeviceBtn').addEventListener('click', async () => {
            try {
                globalStatus.innerText = "Scanning...";
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: SERVICES });

                if (connectedStrips.find(s => s.device.id === device.id)) return;

                globalStatus.innerText = `Connecting to ${device.name}...`;
                const server = await device.gatt.connect();
                
                let service = null;
                for (const uuid of SERVICES) { try { service = await server.getPrimaryService(uuid); if (service) break; } catch (e) {} }
                let writeChar = null;
                for (const uuid of CHARS) { try { writeChar = await service.getCharacteristic(uuid); if (writeChar) break; } catch (e) {} }
                if (!writeChar) throw new Error("No write permissions.");

                // Check Local Storage for saved data
                let saved = JSON.parse(localStorage.getItem('yorick_led_profiles')) || {};
                let profile = saved[device.id] || { name: device.name || "New Strip", color: "#ffffff", bright: 100 };

                const stripObj = {
                    id: device.id,
                    customName: profile.name,
                    device: device,
                    characteristic: writeChar,
                    currentColor: profile.color,
                    currentBrightness: profile.bright,
                    isOn: true,
                    effectMode: "static",
                    effectSpeed: 50,
                    effectTimer: null
                };
                
                connectedStrips.push(stripObj);
                saveProfile(stripObj);
                
                device.addEventListener('gattserverdisconnected', () => {
                    stopEffect(stripObj);
                    connectedStrips = connectedStrips.filter(s => s.device.id !== device.id);
                    renderDeviceCards();
                    globalStatus.innerText = "Device disconnected.";
                });

                renderDeviceCards();
                globalStatus.innerText = `Connected: ${stripObj.customName}`;
                sendData(writeChar, createPayloads(stripObj.currentColor, stripObj.currentBrightness));

            } catch (err) {
                console.error(err);
                globalStatus.innerText = "Pairing cancelled or failed.";
            }
        });

        function disconnectDevice(deviceId) {
            const strip = connectedStrips.find(s => s.device.id === deviceId);
            if (strip && strip.device.gatt.connected) strip.device.gatt.disconnect();
        }

        function renameDevice(deviceId) {
            const strip = connectedStrips.find(s => s.device.id === deviceId);
            if (strip) {
                const newName = prompt("Enter a new name for this zone:", strip.customName);
                if (newName && newName.trim() !== "") {
                    strip.customName = newName.trim();
                    saveProfile(strip);
                    renderDeviceCards();
                }
            }
        }

        // --- 5. UI UPDATES & EVENTS ---
        function setStripState(strip, isOn, color = null, bright = null) {
            strip.isOn = isOn;
            if (color) strip.currentColor = color;
            if (bright) strip.currentBrightness = bright;
            saveProfile(strip);

            if (isOn) {
                if (strip.effectMode === "static") {
                    stopEffect(strip);
                    sendData(strip.characteristic, createPayloads(strip.currentColor, strip.currentBrightness));
                } else {
                    applyEffect(strip);
                }
            } else {
                stopEffect(strip);
                sendData(strip.characteristic, payloadOff);
            }
            updateCardVisuals(strip);
        }

        function updateCardVisuals(strip) {
            const badge = document.getElementById(`badge-${strip.id}`);
            if (badge) {
                badge.innerText = strip.isOn ? "ON" : "OFF";
                badge.style.backgroundColor = strip.isOn ? "#03dac6" : "#cf6679";
            }
            const colorEl = document.getElementById(`color-${strip.id}`);
            if (colorEl) colorEl.value = strip.currentColor;
            const brightEl = document.getElementById(`bright-${strip.id}`);
            if (brightEl) brightEl.value = strip.currentBrightness;
            const selectEl = document.getElementById(`preset-${strip.id}`);
            if (selectEl && !Object.values(PRESETS).includes(strip.currentColor.toLowerCase())) selectEl.value = "";
        }

        function renderDeviceCards() {
            deviceContainer.innerHTML = ''; 
            if (connectedStrips.length === 0) {
                deviceListPanel.style.display = 'none'; return;
            }
            deviceListPanel.style.display = 'block';

            let presetOptions = `<option value="">-- Presets --</option>`;
            for (const [name, hex] of Object.entries(PRESETS)) {
                presetOptions += `<option value="${hex}">${name}</option>`;
            }

            connectedStrips.forEach(strip => {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.innerHTML = `
                    <div class="device-header">
                        <div class="name-group">
                            <span class="device-name" title="Click to rename" onclick="renameDevice('${strip.id}')">${strip.customName} ✎</span>
                            <span class="status-badge" id="badge-${strip.id}">ON</span>
                        </div>
                        <button class="disconnect-btn" onclick="disconnectDevice('${strip.id}')">Disconnect</button>
                    </div>
                    
                    <div class="control-group">
                        <label>Color:</label>
                        <input type="color" value="${strip.currentColor}" id="color-${strip.id}">
                        <select id="preset-${strip.id}">${presetOptions}</select>
                    </div>
                    
                    <div class="control-group">
                        <label>Brightness:</label>
                        <input type="range" min="0" max="100" value="${strip.currentBrightness}" id="bright-${strip.id}">
                    </div>

                    <div class="control-group">
                        <label>Effect:</label>
                        <select id="effect-${strip.id}">
                            <option value="static">Solid Color</option>
                            <option value="flash">Strobe / Flash</option>
                            <option value="rainbow">Rainbow Cycle</option>
                        </select>
                        <input type="range" min="1" max="100" value="${strip.effectSpeed}" id="speed-${strip.id}" title="Speed">
                    </div>
                    
                    <div class="btn-row">
                        <button id="on-${strip.id}" class="btn-on">ON</button>
                        <button id="off-${strip.id}" class="btn-off">OFF</button>
                    </div>
                `;
                deviceContainer.appendChild(card);

                // Set initial select values
                document.getElementById(`preset-${strip.id}`).value = Object.values(PRESETS).includes(strip.currentColor.toLowerCase()) ? strip.currentColor : "";
                document.getElementById(`effect-${strip.id}`).value = strip.effectMode;

                // Event Listeners
                document.getElementById(`color-${strip.id}`).addEventListener('input', (e) => setStripState(strip, true, e.target.value, null));
                document.getElementById(`preset-${strip.id}`).addEventListener('change', (e) => {
                    if(e.target.value) setStripState(strip, true, e.target.value, null);
                });
                document.getElementById(`bright-${strip.id}`).addEventListener('input', (e) => setStripState(strip, true, null, e.target.value));
                
                document.getElementById(`effect-${strip.id}`).addEventListener('change', (e) => {
                    strip.effectMode = e.target.value;
                    setStripState(strip, true);
                });
                document.getElementById(`speed-${strip.id}`).addEventListener('input', (e) => {
                    strip.effectSpeed = e.target.value;
                    if(strip.effectMode !== "static") applyEffect(strip);
                });

                document.getElementById(`on-${strip.id}`).addEventListener('click', () => setStripState(strip, true));
                document.getElementById(`off-${strip.id}`).addEventListener('click', () => setStripState(strip, false));
                updateCardVisuals(strip);
            });
        }

        // GLOBAL EVENT LISTENERS
        document.getElementById('globalColor').addEventListener('input', (e) => {
            connectedStrips.forEach(s => { s.effectMode = "static"; setStripState(s, true, e.target.value, null); });
            renderDeviceCards();
        });
        document.getElementById('globalPresetColors').addEventListener('change', (e) => {
            if(e.target.value) {
                document.getElementById('globalColor').value = e.target.value;
                connectedStrips.forEach(s => { s.effectMode = "static"; setStripState(s, true, e.target.value, null); });
                renderDeviceCards();
            }
        });
        document.getElementById('globalBrightness').addEventListener('input', (e) => {
            connectedStrips.forEach(s => setStripState(s, true, null, e.target.value));
        });
        document.getElementById('globalOnBtn').addEventListener('click', () => {
            connectedStrips.forEach(s => setStripState(s, true));
        });
        document.getElementById('globalOffBtn').addEventListener('click', () => {
            connectedStrips.forEach(s => setStripState(s, false));
        });
    </script>
</body>
</html>
