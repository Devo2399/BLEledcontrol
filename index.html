<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE - Smart Hub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2, h3 { color: #ffffff; text-align: center; margin: 10px 0; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); width: 100%; max-width: 500px; margin-bottom: 20px; }
        .device-card { background: #2a2a2a; border-left: 5px solid #6200ee; padding: 15px; margin-top: 15px; border-radius: 8px; }
        
        button { background: #6200ee; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; transition: background 0.3s; }
        button:hover { background: #7c4dff; }
        button:disabled { background: #444; cursor: not-allowed; color: #888; }
        .btn-row { display: flex; gap: 10px; }
        
        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        input[type="color"] { width: 60px; height: 40px; border: none; background: none; cursor: pointer; }
        input[type="range"] { flex-grow: 1; margin: 0 15px; cursor: pointer; }
        
        .status-text { font-size: 0.85rem; color: #bb86fc; text-align: center; margin-top: 10px; }
        
        .device-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .name-group { display: flex; align-items: center; gap: 10px; }
        .device-name { font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: color 0.2s; }
        .device-name:hover { color: #bb86fc; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: #000; }
        
        .disconnect-btn { background: #cf6679; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .disconnect-btn:hover { background: #ff7597; }
    </style>
</head>
<body>

    <h1>Yorick LED Hub</h1>

    <div class="panel">
        <h2>Global Controls</h2>
        <button id="addDeviceBtn">+ Pair New LED Strip</button>
        <div class="status-text" id="globalStatus">0 Devices Connected</div>
        
        <hr style="border-color: #333; margin: 15px 0;">
        
        <div class="control-group">
            <label>Master Color:</label>
            <input type="color" id="globalColor" value="#ff0000">
        </div>
        <div class="control-group">
            <label>Master Brightness:</label>
            <input type="range" id="globalBrightness" min="0" max="100" value="100">
        </div>
        <div class="btn-row">
            <button id="globalWhiteBtn">All White</button>
            <button id="globalOffBtn">All Off</button>
        </div>
    </div>

    <div class="panel" id="deviceListPanel" style="display: none;">
        <h2>Individual Zones</h2>
        <div id="deviceContainer"></div>
    </div>

    <script>
        let connectedStrips = []; 
        
        const SERVICES = [0xFFD0, 0xFFE0, 0xFFB0, 0xFFF0, '0000ffd0-0000-1000-8000-00805f9b34fb'];
        const CHARS = [0xFFD5, 0xFFE1, 0xFFF3, 0xFFF4];

        const globalStatus = document.getElementById('globalStatus');
        const deviceListPanel = document.getElementById('deviceListPanel');
        const deviceContainer = document.getElementById('deviceContainer');

        // MULTI-PROTOCOL PAYLOAD GENERATOR
        // Returns an array of payloads to support both Lotus and ELK-BLEDOM/duoCo devices
        function createPayloads(hexColor, brightnessPercent) {
            let r = parseInt(hexColor.slice(1,3), 16);
            let g = parseInt(hexColor.slice(3,5), 16);
            let b = parseInt(hexColor.slice(5,7), 16);
            
            let scale = brightnessPercent / 100;
            r = Math.round(r * scale);
            g = Math.round(g * scale);
            b = Math.round(b * scale);
            
            return [
                // 1. Generic/Lotus Protocol
                new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]), 
                // 2. ELK-BLEDOB Power ON command (required to wake it up)
                new Uint8Array([0x7e, 0x00, 0x04, 0xf0, 0x00, 0x01, 0xff, 0x00, 0xef]),
                // 3. ELK-BLEDOB Color command
                new Uint8Array([0x7e, 0x00, 0x05, 0x03, r, g, b, 0x00, 0xef])
            ];
        }

        // Hardcoded "Off" commands for both dialects
        const payloadOff = [
            new Uint8Array([0x56, 0x00, 0x00, 0x00, 0x00, 0xf0, 0xaa]),
            new Uint8Array([0x7e, 0x00, 0x04, 0x00, 0x00, 0x00, 0xff, 0x00, 0xef])
        ];

        // Universal sender function that iterates through our multi-protocol payloads
        async function sendData(characteristic, payloadsArray) {
            for (let data of payloadsArray) {
                try {
                    await characteristic.writeValue(data);
                    // Tiny 40ms delay between sending different languages so the BLE chip doesn't choke
                    await new Promise(r => setTimeout(r, 40)); 
                } catch (e) {
                    console.error("Write failed", e);
                }
            }
        }

        function updateCardVisuals(strip) {
            const nameEl = document.getElementById(`name-${strip.id}`);
            if (nameEl) nameEl.innerText = strip.customName + " ✎";

            const badgeEl = document.getElementById(`badge-${strip.id}`);
            if (badgeEl) {
                badgeEl.innerText = strip.isOn ? "ON" : "OFF";
                badgeEl.style.backgroundColor = strip.isOn ? "#03dac6" : "#cf6679";
            }

            const colorEl = document.getElementById(`color-${strip.id}`);
            if (colorEl) colorEl.value = strip.currentColor;

            const brightEl = document.getElementById(`bright-${strip.id}`);
            if (brightEl) brightEl.value = strip.currentBrightness;
        }

        document.getElementById('addDeviceBtn').addEventListener('click', async () => {
            try {
                globalStatus.innerText = "Scanning for new device...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: SERVICES
                });

                if (connectedStrips.find(s => s.device.id === device.id)) {
                    globalStatus.innerText = "Device already added!";
                    return;
                }

                globalStatus.innerText = `Connecting to ${device.name}...`;
                const server = await device.gatt.connect();
                
                let service = null;
                for (const uuid of SERVICES) {
                    try { service = await server.getPrimaryService(uuid); if (service) break; } catch (e) {}
                }
                if (!service) throw new Error("No compatible service found.");

                let writeChar = null;
                for (const uuid of CHARS) {
                    try { writeChar = await service.getCharacteristic(uuid); if (writeChar) break; } catch (e) {}
                }
                if (!writeChar) throw new Error("No write permissions.");

                const stripObj = {
                    id: device.id,
                    customName: device.name || "Unknown Strip",
                    device: device,
                    characteristic: writeChar,
                    currentColor: "#ffffff", // Default to white
                    currentBrightness: 100,
                    isOn: true 
                };
                connectedStrips.push(stripObj);
                
                device.addEventListener('gattserverdisconnected', () => handleDisconnect(device.id));

                renderDeviceCards();
                globalStatus.innerText = `Successfully added ${stripObj.customName}`;
                
                // Wake the strip up immediately upon connection
                sendData(writeChar, createPayloads("#ffffff", 100));

            } catch (err) {
                console.error(err);
                globalStatus.innerText = err.message.includes("cancelled") ? "Scan cancelled." : "Pairing failed.";
            }
        });

        function handleDisconnect(deviceId) {
            connectedStrips = connectedStrips.filter(s => s.device.id !== deviceId);
            renderDeviceCards();
            globalStatus.innerText = "A device disconnected.";
        }

        function disconnectDevice(deviceId) {
            const strip = connectedStrips.find(s => s.device.id === deviceId);
            if (strip && strip.device.gatt.connected) {
                strip.device.gatt.disconnect();
            }
        }

        function renameDevice(deviceId) {
            const strip = connectedStrips.find(s => s.device.id === deviceId);
            if (strip) {
                const newName = prompt("Enter a new name for this zone:", strip.customName);
                if (newName && newName.trim() !== "") {
                    strip.customName = newName.trim();
                    updateCardVisuals(strip);
                }
            }
        }

        // GLOBAL LISTENERS
        document.getElementById('globalColor').addEventListener('input', (e) => {
            const color = e.target.value;
            const bright = document.getElementById('globalBrightness').value;
            const payloads = createPayloads(color, bright);
            
            connectedStrips.forEach(strip => {
                strip.currentColor = color;
                strip.currentBrightness = bright;
                strip.isOn = true;
                sendData(strip.characteristic, payloads);
                updateCardVisuals(strip);
            });
        });

        document.getElementById('globalBrightness').addEventListener('input', (e) => {
            const bright = e.target.value;
            const color = document.getElementById('globalColor').value;
            const payloads = createPayloads(color, bright);
            
            connectedStrips.forEach(strip => {
                strip.currentBrightness = bright;
                strip.isOn = true;
                sendData(strip.characteristic, payloads);
                updateCardVisuals(strip);
            });
        });

        document.getElementById('globalWhiteBtn').addEventListener('click', () => {
            const payloads = createPayloads("#ffffff", 100);
            connectedStrips.forEach(strip => {
                strip.currentColor = "#ffffff";
                strip.currentBrightness = 100;
                strip.isOn = true;
                sendData(strip.characteristic, payloads);
                updateCardVisuals(strip);
            });
        });

        document.getElementById('globalOffBtn').addEventListener('click', () => {
            connectedStrips.forEach(strip => {
                strip.isOn = false;
                sendData(strip.characteristic, payloadOff);
                updateCardVisuals(strip);
            });
        });

        // DYNAMIC UI RENDERING
        function renderDeviceCards() {
            deviceContainer.innerHTML = ''; 
            
            if (connectedStrips.length === 0) {
                deviceListPanel.style.display = 'none';
                globalStatus.innerText = "0 Devices Connected";
                return;
            }

            deviceListPanel.style.display = 'block';
            globalStatus.innerText = `${connectedStrips.length} Device(s) Connected`;

            connectedStrips.forEach(strip => {
                const card = document.createElement('div');
                card.className = 'device-card';
                
                card.innerHTML = `
                    <div class="device-header">
                        <div class="name-group">
                            <span class="device-name" id="name-${strip.id}" title="Click to rename" onclick="renameDevice('${strip.id}')">${strip.customName} ✎</span>
                            <span class="status-badge" id="badge-${strip.id}">ON</span>
                        </div>
                        <button class="disconnect-btn" onclick="disconnectDevice('${strip.id}')">Disconnect</button>
                    </div>
                    <div class="control-group">
                        <label>Color:</label>
                        <input type="color" value="${strip.currentColor}" id="color-${strip.id}">
                    </div>
                    <div class="control-group">
                        <label>Brightness:</label>
                        <input type="range" min="0" max="100" value="${strip.currentBrightness}" id="bright-${strip.id}">
                    </div>
                    <div class="btn-row">
                        <button id="white-${strip.id}">White</button>
                        <button id="off-${strip.id}">Off</button>
                    </div>
                `;
                deviceContainer.appendChild(card);

                updateCardVisuals(strip);

                // INDIVIDUAL LISTENERS
                document.getElementById(`color-${strip.id}`).addEventListener('input', (e) => {
                    strip.currentColor = e.target.value;
                    strip.isOn = true;
                    sendData(strip.characteristic, createPayloads(strip.currentColor, strip.currentBrightness));
                    updateCardVisuals(strip);
                });

                document.getElementById(`bright-${strip.id}`).addEventListener('input', (e) => {
                    strip.currentBrightness = e.target.value;
                    strip.isOn = true;
                    sendData(strip.characteristic, createPayloads(strip.currentColor, strip.currentBrightness));
                    updateCardVisuals(strip);
                });

                document.getElementById(`white-${strip.id}`).addEventListener('click', () => {
                    strip.currentColor = "#ffffff";
                    strip.currentBrightness = 100;
                    strip.isOn = true;
                    sendData(strip.characteristic, createPayloads("#ffffff", 100));
                    updateCardVisuals(strip);
                });

                document.getElementById(`off-${strip.id}`).addEventListener('click', () => {
                    strip.isOn = false;
                    sendData(strip.characteristic, payloadOff);
                    updateCardVisuals(strip);
                });
            });
        }
    </script>
</body>
</html>
