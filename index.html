<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorick BLE Controller - Universal Scan</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 300px; }
        button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #6200ee; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #7c4dff; }
        button:disabled { background: #444; cursor: not-allowed; }
        input[type="color"] { width: 100%; height: 80px; border: none; background: none; cursor: pointer; margin: 15px 0; }
        .status { font-size: 0.8rem; color: #bb86fc; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>LED Control</h2>
        <button id="connect">Find Bluetooth Device</button>
        <p style="font-size: 0.7rem; color: #aaa;">Scan may take a moment. Choose your LED strip from the list.</p>
        
        <input type="color" id="color" value="#ff0000" disabled>
        
        <button class="fx" data-hex="56ffffff00f0aa" disabled>Set White</button>
        <button class="fx" data-hex="5600000000f0aa" disabled>Power Off</button>
        
        <div id="status" class="status">Status: Disconnected</div>
    </div>

    <script>
        // Common UUIDs for Generic, Lotus, and Govee strips
        const POSSIBLE_SERVICES = [0xFFD0, 0xFFE0, "00010203-0405-0607-0809-0a0b0c0d0e0f"];
        const WRITE_CHAR = 0xFFD5; // Most common write characteristic
        
        let writeCharacteristic = null;

        document.getElementById('connect').addEventListener('click', async () => {
            const statusLabel = document.getElementById('status');
            try {
                statusLabel.innerText = "Status: Scanning...";
                
                // REWRITE: acceptAllDevices set to true to find everything 
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: POSSIBLE_SERVICES
                });

                statusLabel.innerText = `Status: Connecting to ${device.name}...`;
                const server = await device.gatt.connect();
                
                // Try the most common service first
                const service = await server.getPrimaryService(0xFFD0);
                writeCharacteristic = await service.getCharacteristic(WRITE_CHAR);

                statusLabel.innerText = `Status: Connected to ${device.name}`;
                document.getElementById('color').disabled = false;
                document.querySelectorAll('.fx').forEach(b => b.disabled = false);
                
                device.addEventListener('gattserverdisconnected', () => {
                    statusLabel.innerText = "Status: Connection Lost";
                    document.getElementById('color').disabled = true;
                });

            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Status: Error (Check Console)";
                alert("Scan cancelled or failed. Ensure Bluetooth is ON and you are using HTTPS.");
            }
        });

        document.getElementById('color').addEventListener('input', async (e) => {
            if (!writeCharacteristic) return;
            const r = parseInt(e.target.value.slice(1, 3), 16);
            const g = parseInt(e.target.value.slice(3, 5), 16);
            const b = parseInt(e.target.value.slice(5, 7), 16);
            
            // Standard Lotus payload [cite: 247]
            const data = new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]);
            await writeCharacteristic.writeValue(data);
        });

        document.querySelectorAll('.fx').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!writeCharacteristic) return;
                const bytes = btn.dataset.hex.match(/[0-9a-f]{2}/gi).map(h => parseInt(h, 16));
                await writeCharacteristic.writeValue(new Uint8Array(bytes));
            });
        });
    </script>
</body>
</html>
